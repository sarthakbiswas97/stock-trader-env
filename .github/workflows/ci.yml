name: CI

on:
  push:
    branches: [main, "v2/**", "v3/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check server/ models.py training/ baselines/ world_model/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install gymnasium mlflow stable-baselines3
          pip install pytest pytest-cov datasets
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Download market data from HF Hub
        run: |
          python -c "
          from datasets import load_dataset
          from pathlib import Path
          import pandas as pd

          ds = load_dataset('sarthakbiswas/stock-trader-market-data')

          ohlcv_dir = Path('data/ohlcv')
          ohlcv_dir.mkdir(parents=True, exist_ok=True)
          ohlcv_df = ds['ohlcv'].to_pandas()
          for symbol, group in ohlcv_df.groupby('symbol'):
              group = group.drop(columns=['symbol', 'data_type'])
              group.to_csv(ohlcv_dir / f'{symbol}_daily.csv', index=False)

          macro_dir = Path('data/macro')
          macro_dir.mkdir(parents=True, exist_ok=True)
          macro_df = ds['macro'].to_pandas()
          for name, group in macro_df.groupby('symbol'):
              group = group.drop(columns=['symbol', 'data_type'])
              group.to_csv(macro_dir / f'{name}_daily.csv', index=False)

          print(f'Downloaded {len(ohlcv_df.symbol.unique())} stocks + {len(macro_df.symbol.unique())} macro instruments')
          "

      - name: Run tests
        run: >
          PYTHONPATH=. pytest
          --cov=server --cov=models --cov=world_model
          --cov-report=term-missing
          --cov-fail-under=80
