name: CI

on:
  push:
    branches: [main, "v2/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check server/ models.py training/ baselines/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install gymnasium mlflow stable-baselines3
          pip install pytest pytest-cov
          pip install -e .

      - name: Run tests
        run: PYTHONPATH=. pytest --cov=server --cov=models --cov-report=term-missing --cov-fail-under=80
